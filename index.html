<title>THE BACKROOMS</title>
<!--
  Single-file procedural backrooms — TRUE MULTI-LEVEL.
  Double-click to run (needs internet for the three.js CDN). If your browser blocks
  ES-module loading from file://, serve the folder:  python -m http.server

  Stacked flat floors connected by stairwells that cut holes through the slabs.
  Variable ceilings (normal / 2-story / multi-story atriums). Open & droppable: no rails,
  you can fall into atriums and stairwells (no damage). Connected themed zones:
    NORMAL  — ordinary maze of rooms + corridors (the connective tissue)
    ATRIUM  — frequent tall multi-storey voids / light-wells you can drop into
    PILLARS — open columned halls with eerily repeating (deja-vu) layouts
    WRONG   — long corridors + abrupt ceiling-height jumps
	BENDS — bendy maze with no stairs and no direct ways through
	
-->

import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

import { VRButton } from 'three/addons/webxr/VRButton.js';

/* ============================================================================
 * CONFIG
 * ========================================================================== */
const CELL = 4;                 // metres per grid cell
const STORY_H = 4;              // floor-to-floor height
const CEIL_NORMAL = STORY_H;    // ceiling sits at the next floor's level (no plenum gap to see through)
const WALL_THICK = 0.25, COL_W = 0.46; // column a touch wider than the walls it sits in
const SLAB = 0.35, SLAB_EPS = 0.012; // structural floor thickness + a hair of clearance so the dropped ceiling never z-fights the slab underside
const CHUNK = 8;                // cells per chunk edge
const RENDER_RADIUS = 2;        // chunks around player (=> 5x5)
const FLOORS_BELOW = 6, FLOORS_ABOVE = 4; // vertical render window. BELOW = VPER so a full-height atrium/stairwell renders to the bottom when viewed from its top (lower if FPS drops)
const BUILD_BUDGET_MS = 2.0;    // per-frame time budget for streaming-in chunk-floors: a boundary crossing needs ~55 builds, so they're queued and amortised across frames instead of all built in one (the source of the movement hitch). Nearest-first, so any pop-in is at the far render rim.

const CROUCH_EYE = 0.95;        // eye height while right mouse button is held (feet stay on the floor; only the view drops)
const CROUCH_RATE = 14;         // how fast the view eases between standing and crouched (per second; higher = snappier)
const CROUCH_SPEED = 0.25;      // crawl speed as a fraction of WALK while crouched (quiet sneaking; overrides sprint)
const FOV = 75, CROUCH_FOV = 60; // crouching narrows the view: less peripheral vision (intended unease) + a tighter look at what you're avoiding. Eased like the eye height.
const WALK = 3.6, SPRINT = 1.9, JUMP = 5.2;
const GRAVITY = 22, STEP_UP = 0.55, SNAP_DOWN = 0.55, TERMINAL = 40;
const STAIR_PROB = 0.16;        // chance a room hosts a stair up to the floor capping it (per room)
// Stairs are GLB models (see the stairwells section + rendering): a straight solid concrete flight for
// 1-storey rooms, stacked switchback stairwell units for taller rooms. Both have 10 risers per storey
// (STORY_H/10 = 0.4 m, under STEP_UP) and fill a 1x2-cell footprint wall-to-wall. No rails anywhere.
const STAIR_THICK = 0.5;        // approx slab thickness of a switchback flight/landing: its underside (soffit) sits ~this far below its top walking surface. Walk-UNDER is allowed wherever that soffit clears the player's eye — so the high flights pass standing, and CROUCHING (lower eye, hold RMB) ducks you under the low half-landing/east-end soffits (~1.73 m) that block when standing. Standing eye (EYE=1.7) + STAIR_THICK = 2.2 m of headroom required, matching the old fixed clearance.

const S5_SCALE = (2 * CELL) / S5_LEN;
const TALL_BLOCK = 3;           // footprint of tall rooms / atriums (cells); also the stair footprint
const VPER = 6;                 // vertical tiling period (floors): rooms are 1..6 storeys; floors === 0 (mod VPER) are always solid
const LIGHT_BROKEN = 0.20, LIGHT_FLICKER = 0.29; // dead lamps = seed < BROKEN (20%); flickering = BROKEN..FLICKER (~9%). Keep FLICKER > BROKEN or the flicker band vanishes.

// realtime lights or shadow maps — the cost is paid once per chunk build (and amortised by the streamer).
const BAKE_LAMP_R2 = 30;        // lamp influence radius^2 (m^2): how far a fixture's pool reaches
const BAKE_AO = 0.5;            // ambient-occlusion of the pool where boxed in by maze walls (corners darkest)
const POOL_GAIN = 0.30;         // strength of the baked lamp-pool light added (as emissive) to floors/walls. Trimmed to compensate for the higher room fill above, so lit surfaces stay ~as bright while the dark FLOOR of brightness (what props get) rises. Lower = gloomier/moodier pools.
const ZONE_SIZE = 16;           // cells per zone tile (the SPECIAL zones: atrium/pillars/wrong)
const NZONE = 32;               // coarse grid for NORMAL & BENDS regions (2x linear = 4x area of a special tile): big sprawling regions
const NORMAL_BIG_P = 0.52;      // share of coarse tiles that are one large NORMAL region
const BENDS_BIG_P = 0.18;       // ... and one large BENDS region (also coarse-grid, ~NORMAL size, to hold a well-formed maze). Rest subdivide into specials
const P_WALL_NORMAL = 0.50;     // NORMAL maze wall density (per continuous wall RUN). Higher = denser rooms / more closed cells
const NRUN_MIN = 4, NRUN_SPAN = 8; // NORMAL walls run continuously for NRUN_MIN..NRUN_MIN+NRUN_SPAN-1 cells -> unbroken corridor walls
// BENDS = long winding corridors via spatially-varying FLOW: each FLOW_BLK-sized block channels movement
// either E-W or N-S (low wall density ALONG the flow, high ACROSS it), and the flow flips block-to-block, so
// a corridor runs long in one direction then bends into the next block's direction. No stairs/atriums/arterials.
const BENDS_FLOW_BLK = 7;       // block size (cells) over which the flow direction is constant -> ~corridor segment length before a bend
const BENDS_OPEN = 0.34;        // wall density ALONG the flow. Raised + closer to CROSS -> a tighter, more uniform braided maze (less wide-open) that still has a mild directional flow for winding
const BENDS_CROSS = 0.50;       // wall density ACROSS the flow -> ~1-wide corridors. Lower this for more cross-links (more open/looser); raise for tighter
const CORNER_P_BENDS = 1.00;    // BENDS rounds EVERY eligible (checkerboard) corner -> curved by default, right angles minimised
const ART = 10;                 // arterial corridor spacing (cells): guarantees global connectivity. Wider => much longer corridors + longer unbroken walls between the open thoroughfares
const NORMAL_CARVE_P = 0.6;     // fraction of NORMAL's fully-sealed cells that get a carve opening; the rest stay genuinely closed (closed rooms). Player still reaches the world via the arterial backbone
const FOG_DENSITY = 0.045;

const SEED = (() => { const m = location.hash.match(/seed=(-?\d+)/); return m ? (parseInt(m[1], 10) >>> 0) : 1337; })();

/* ============================================================================
 * HASH
 * ========================================================================== */
function hashInt(x, y, salt) {

  h = Math.imul(h ^ (x | 0), 16777619);
  h = Math.imul(h ^ (y | 0), 16777619);
  h = Math.imul(h ^ (salt | 0), 16777619);
  h ^= h >>> 13; h = Math.imul(h, 0x5bd1e995); h ^= h >>> 15;
  return h >>> 0;
}
const hash01 = (x, y, salt) => hashInt(x, y, salt) / 4294967296;
const fdiv = (a, b) => Math.floor(a / b);
const fmod = (a, b) => ((a % b) + b) % b;

const SALT_E = 11, SALT_N = 22, SALT_CARVE = 33, SALT_ZONE = 44, SALT_TALL = 55, SALT_STAIR = 66, SALT_LIGHT = 77, SALT_STAIRROT = 88, SALT_CORNER = 111, SALT_ZONE2 = 122, SALT_RUNX = 133, SALT_RUNZ = 144, SALT_CARVE2 = 155, SALT_FLOW = 166;
const CORNER_P_NORMAL = 0.60;          // chance an eligible even/even inside-corner gets the rounded-corner model (NORMAL zones) — bumped for a more curvy NORMAL
const CORNER_P_ODD = 0.14;             // ... rarer in PILLARS / WRONG zones (0 in ATRIUM / elsewhere)
const FLOORMIX = 0x9e3779b1;            // mixes the floor index into per-floor salts

/* ============================================================================
 * ZONES  (low-frequency themed regions; NORMAL is the connective tissue)
 * ========================================================================== */
const Z_NORMAL = 0, Z_ATRIUM = 1, Z_PILLARS = 2, Z_WRONG = 3, Z_BENDS = 4;
const ZONE_NAMES = ['NORMAL', 'ATRIUM', 'PILLARS', 'WRONG', 'BENDS'];
// Two tiers so NORMAL regions are ~4x the area of a special: a COARSE grid (NZONE) first claims big
// NORMAL blocks; whatever's left subdivides on the FINE grid (ZONE_SIZE) into atrium/pillars/wrong/bends.
function zoneAt(gx, gz) {
  const c = hash01(fdiv(gx, NZONE), fdiv(gz, NZONE), SALT_ZONE);   // coarse tier: big NORMAL & BENDS regions
  if (c < NORMAL_BIG_P) return Z_NORMAL;
  if (c < NORMAL_BIG_P + BENDS_BIG_P) return Z_BENDS;
  const r = hash01(fdiv(gx, ZONE_SIZE), fdiv(gz, ZONE_SIZE), SALT_ZONE2);  // fine tier: the rest -> atrium/pillars/wrong
  if (r < 0.40) return Z_ATRIUM;
  if (r < 0.73) return Z_PILLARS;
  return Z_WRONG;
}

/* ============================================================================
 * VERTICAL TILING  (each TALL_BLOCK column's floors are tiled in periods of VPER
 *  into stacked rooms of 1..6 storeys; floors === 0 (mod VPER) are ALWAYS solid)
 * ========================================================================== */
// pattern[pos] = storeys if pos is a room base, 0 if void (open volume above a taller room).
// Each pattern is a COMPOSITION of VPER(=6): an s-storey room at pos p is followed by s-1
// voids, so the next base lands exactly on pos p+s. This is what guarantees a stair's landing
// floor (the room's cap) is always solid — see the stairwells section.
const PV_1   = [1, 1, 1, 1, 1, 1];           // six single-storey rooms (the common case)
const PV_2a  = [2, 0, 1, 1, 1, 1];
const PV_2b  = [1, 1, 2, 0, 1, 1];
const PV_22  = [2, 0, 2, 0, 1, 1];
const PV_222 = [2, 0, 2, 0, 2, 0];
const PV_3   = [3, 0, 0, 1, 1, 1];
const PV_32  = [3, 0, 0, 2, 0, 1];
const PV_33  = [3, 0, 0, 3, 0, 0];
const PV_4   = [4, 0, 0, 0, 1, 1];
const PV_42  = [4, 0, 0, 0, 2, 0];
const PV_5   = [5, 0, 0, 0, 0, 1];
const PV_6   = [6, 0, 0, 0, 0, 0];           // one cathedral-height atrium spanning the whole period
function tallPattern(bx, bz, k) {
  const X0 = bx * TALL_BLOCK, Z0 = bz * TALL_BLOCK, zc = zoneAt(X0 + 1, Z0 + 1);
  if (zc === Z_PILLARS) return PV_1;             // pillar halls: uniform single-storey ceiling (no gaps)
  // BENDS (and any room block straddling a BENDS seam — a 3x3 block can cross the 16-cell zone grid) is
  // uniformly single-storey, so no atrium/tall room ever pokes into the corridor maze. Corners checked too.
  if (zc === Z_BENDS || zoneAt(X0, Z0) === Z_BENDS || zoneAt(X0 + 2, Z0) === Z_BENDS || zoneAt(X0, Z0 + 2) === Z_BENDS || zoneAt(X0 + 2, Z0 + 2) === Z_BENDS) return PV_1;
  const r = hash01(bx, bz, fsalt(SALT_TALL, k));
  if (zc === Z_ATRIUM)                           // frequent tall light-wells, up to 6 storeys
    return r < 0.16 ? PV_1 : r < 0.30 ? PV_6  : r < 0.42 ? PV_5  : r < 0.56 ? PV_42 :

  if (zc === Z_WRONG)                            // abrupt ceiling-height jumps
    return r < 0.45 ? PV_1  : r < 0.60 ? PV_2a : r < 0.72 ? PV_22 : r < 0.82 ? PV_3 :
           r < 0.90 ? PV_33 : r < 0.96 ? PV_4  : PV_6;
  return r < 0.72 ? PV_1 : r < 0.82 ? PV_2a : r < 0.90 ? PV_2b : r < 0.96 ? PV_3 : r < 0.99 ? PV_33 : PV_42; // mostly normal
}
function roomStoriesAt(gx, gz, F) {       // 0 => void cell, else storeys of the room based here
  const bx = fdiv(gx, TALL_BLOCK), bz = fdiv(gz, TALL_BLOCK), k = fdiv(F, VPER);
  return tallPattern(bx, bz, k)[fmod(F, VPER)];
}
function roomBaseFloor(gx, gz, F) {        // floor the room occupying (cell,F) is based on
  const bx = fdiv(gx, TALL_BLOCK), bz = fdiv(gz, TALL_BLOCK), k = fdiv(F, VPER), pat = tallPattern(bx, bz, k);
  for (let p = fmod(F, VPER); p >= 0; p--) if (pat[p] !== 0) return VPER * k + p;
  return VPER * k;                         // unreachable (pos 0 is always a base)
}
const ceilStoriesH = s => CEIL_NORMAL + (s - 1) * STORY_H;   // 4 / 8 / 12 / 16 / 20 / 24

/* ============================================================================
 * STAIRWELLS  (per-room: a stair climbs a room's full height to the solid floor
 *  that caps it, on a 1x2-cell footprint inside the room's TALL_BLOCK. A 1-storey
 *  room gets one straight solid flight (stairs_5_concrete.glb); a taller room gets
 *  one switchback stairwell unit PER STOREY (stairs_mp_1.glb) stacked into a real
 *  stairwell. The landing floor is always solid — see the composition note above.)
 * ========================================================================== */
const repX = bx => bx * TALL_BLOCK, repZ = bz => bz * TALL_BLOCK;  // a representative cell of column (bx,bz)
function roomHasStairRaw(bx, bz, Fb) {     // Fb must be a room base; pure hash gate (no cross-floor deps)
  if (roomStoriesAt(repX(bx), repZ(bz), Fb) === 0) return false;
  if (zoneAt(bx * TALL_BLOCK + 1, bz * TALL_BLOCK + 1) === Z_BENDS) return false;  // BENDS: no stairs (corridor maze only)
  return hash01(bx, bz, fsalt(SALT_STAIR, Fb)) < STAIR_PROB;

// Effective stair: never put one in a room whose floor IS the landing/cutout of the stair beneath it.

// both ends on real floor so the stair is enterable and doesn't lead to / come from a ledge. WRONG keeps the
// odd ones (deliberate disorientation). The entry/exit solidity test is `stairEndsSolid` (defined below).
function roomHasStair(bx, bz, Fb) {

  if (roomHasStairRaw(bx, bz, roomBaseFloor(repX(bx), repZ(bz), Fb - 1))) return false;
  if (zoneAt(bx * TALL_BLOCK + 1, bz * TALL_BLOCK + 1) === Z_WRONG) return true;

// A stair is defined in a canonical orientation (climbing +x) then rotated about the centre of its

// (a,b) measured from the footprint centre — works for both integer cell offsets and continuous metres.

function rot2(a, b, r) {

// Both ends of the stair land on real floor (no ledge): the ENTRY is the cell west of the footprint (canonical
// (-1,0) — the foot of the climb, in the neighbour block) at base Fb; the EXIT is the in-block step-off cell at
// the cap (canonical (2,0) for the straight flight, (0,1) for the switchback stack) at Fb+H. `w` is the same
// centre-rotation the rendering/exit-edge use. Pure roomStoriesAt only (no stair calls) — no recursion into
// roomHasStair. The exit is already solid by the vertical composition; the entry is the one that can be a void.

  const w = c => { const [u, v] = rot2(c[0] - 1, c[1] - 1, r); return [X0 + u + 1, Z0 + v + 1]; };
  const [ex, ez] = w([-1, 0]), [xx, xz] = w(H <= 1 ? [2, 0] : [0, 1]);

}
// Classify a cell of the stair based at (column, Fb): null, or {H, kind, r}. kind 'S' = the straight
// 1-storey flight, 'W' = a stack of switchback units (one per storey). Both kinds occupy canonical
// cells (0,0) and (1,0) of the 3x3 block, entered from the west edge; the world cell is
// inverse-rotated into that canonical frame to classify it.
function stairKind(gx, gz, Fb) {
  const bx = fdiv(gx, TALL_BLOCK), bz = fdiv(gz, TALL_BLOCK);
  if (!roomHasStair(bx, bz, Fb)) return null;
  const H = roomStoriesAt(repX(bx), repZ(bz), Fb), r = stairRot(bx, bz, Fb);
  const [cu, cv] = invRot2(fmod(gx, TALL_BLOCK) - 1, fmod(gz, TALL_BLOCK) - 1, r);

const stairCutCell = stairRunCell;         // cells holed through the capping floor: the whole footprint (the climber tops out flush with the cap inside it)
// Hole punched in floor F by the stair in the room directly below (which caps exactly at F).
function stairCutout(gx, gz, F) {
  const below = roomBaseFloor(repX(fdiv(gx, TALL_BLOCK)), repZ(fdiv(gz, TALL_BLOCK)), F - 1);
  const H = roomStoriesAt(repX(fdiv(gx, TALL_BLOCK)), repZ(fdiv(gz, TALL_BLOCK)), below);
  if (below + H !== F) return false;
  return stairCutCell(gx, gz, below);
}
// Canonical metres of a world point in the stair's (rotated) footprint frame: x' 0..2*CELL runs
// west->east along the climb axis, z' 0..CELL across it. Shared by stairSurface and stairBlocked.
function stairCanon(gx, gz, x, z, r) {
  const bx = fdiv(gx, TALL_BLOCK), bz = fdiv(gz, TALL_BLOCK);
  const Cx = (repX(bx) + 1.5) * CELL, Cz = (repZ(bz) + 1.5) * CELL;   // block centre
  const [qx, qz] = invRot2(x - Cx, z - Cz, r);
  return [qx + 1.5 * CELL, qz + 1.5 * CELL];
}
// Walking surface of the stair based at Fb at or below yMax, at point (x,z) in run cell (gx,gz); null
// if none fits under yMax. QUANTIZED to the models' real treads (10 risers of STORY_H/10 per storey)
// so the feet sit flush on what is rendered.

const DIAG = /diag/.test(location.search + location.hash);   // ?diag (query busts Safari's cache) or #diag
let dlog = () => {};
if (DIAG) {
  const d = document.createElement('div');
  d.style.cssText = 'position:fixed;left:0;top:0;max-width:100%;max-height:60%;overflow:auto;z-index:60;background:rgba(0,0,0,.82);color:#9f9;font:10px/1.35 monospace;padding:5px;white-space:pre-wrap;pointer-events:none';
  document.body.appendChild(d);
  dlog = (...a) => { d.textContent += a.map(x => x === undefined ? 'undef' : String(x)).join(' ') + '\n'; };
  dlog('BUILD diag-2 (' + new Date().toISOString().slice(0, 16) + ')');   // confirms the page is fresh, not cached
  const oe = console.error, ow = console.warn;
  console.error = (...a) => { dlog('ERR', a.map(String).join(' ')); oe.apply(console, a); };
  console.warn = (...a) => { dlog('WARN', a.map(String).join(' ')); ow.apply(console, a); };
  window.addEventListener('error', e => dlog('JS', e.message));
  window.addEventListener('unhandledrejection', e => dlog('REJ', (e.reason && e.reason.message) || e.reason));
  renderer.debug.onShaderError = (gl, prog, vs, fs) => {
    dlog('SHADER FAIL', (gl.getProgramInfoLog(prog) || '').trim(), '| FS:', (gl.getShaderInfoLog(fs) || '').slice(0, 240).trim(), '| VS:', (gl.getShaderInfoLog(vs) || '').slice(0, 120).trim());
  };
  try {
    const gl = renderer.getContext(), dbg = gl.getExtension('WEBGL_debug_renderer_info');
    dlog('GL', gl.getParameter(gl.VERSION));
    if (dbg) dlog('GPU', gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL));
    dlog('maxTexSize', gl.getParameter(gl.MAX_TEXTURE_SIZE), '| varyings', gl.getParameter(gl.MAX_VARYING_VECTORS),
         '| fragUnif', gl.getParameter(gl.MAX_FRAGMENT_UNIFORM_VECTORS), '| texUnits', gl.getParameter(gl.MAX_TEXTURE_IMAGE_UNITS));
  } catch (e) { dlog('cap err', e.message); }
}

// --- Image-based lighting (IBL) -----------------------------------------------------------------
// The scene previously had NO environment, so PBR models (chair, lamp housings — all metalness:0,
// roughness:1, dark textures) had nothing to reflect and rendered as flat black silhouettes no
// matter how much flat fill was added. This dim equirectangular gradient stands in for the room's
// bounced light: a warm luminous band overhead (the fluorescent ceiling), fading through a dingy
// dark horizon to a deep-red glow below (the red carpet bouncing up). PMREM-blurred into an
// irradiance+reflection probe on scene.environment so EVERY MeshStandardMaterial — procedural
// surfaces AND imported props — gets realistic soft ambient plus reflections. Specular reflection
// is independent of a surface's (dark) albedo, so this is what lifts the models off pure black and
// balances the lighting. Baked once at startup -> no realtime-light/shadow cost (web-friendly).
function makeRoomEnv() {
  const c = document.createElement('canvas'); c.width = 16; c.height = 256;
  const x = c.getContext('2d'), g = x.createLinearGradient(0, 0, 0, 256);  // v: top row = straight up, bottom row = straight down
  g.addColorStop(0.00, '#a89a6e');   // up: warm luminous ceiling glow
  g.addColorStop(0.20, '#5f5739');
  g.addColorStop(0.45, '#322d1c');
  g.addColorStop(0.52, '#2a2417');   // horizon: dingy and dim
  g.addColorStop(0.75, '#2a1310');
  g.addColorStop(1.00, '#330d0a');   // down: deep red carpet bounce
  x.fillStyle = g; x.fillRect(0, 0, 16, 256);
  const t = new THREE.CanvasTexture(c);
  t.mapping = THREE.EquirectangularReflectionMapping;
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
try {
  const pmrem = new THREE.PMREMGenerator(renderer);
  const src = makeRoomEnv();
  scene.environment = pmrem.fromEquirectangular(src).texture;   // hung on the scene -> auto-applied to all PBR materials that lack their own envMap
  src.dispose(); pmrem.dispose();
} catch (e) { console.warn('IBL env setup failed (continuing without it):', e); }

}

  for (let i = 0; i < d.length; i += 4) { const n = (Math.random() * 2 - 1) * amp; d[i] += n; d[i + 1] += n * 0.95; d[i + 2] += n * (rb ?? 0.7); }
  g.putImageData(img, 0, 0);
}

  g.globalAlpha = 0.05; for (let k = 0; k < 60; k++) { g.fillStyle = Math.random() < 0.5 ? '#4d1010' : '#8a2c28'; const x = Math.random() * s, y = Math.random() * s; g.beginPath(); g.arc(x, y, 4 + Math.random() * 10, 0, 7); g.fill(); }
  g.globalAlpha = 1; return finalize(c, 2, 2);
}

  g.fillStyle = '#8d8a83'; g.fillRect(0, 0, s, s); addNoise(g, s, 16, 1);
  g.globalAlpha = 0.07; for (let k = 0; k < 26; k++) { g.fillStyle = Math.random() < 0.5 ? '#6f6c66' : '#a6a39b'; const x = Math.random() * s, y = Math.random() * s; g.beginPath(); g.arc(x, y, 5 + Math.random() * 24, 0, 7); g.fill(); }
  g.globalAlpha = 0.5; g.strokeStyle = '#6b685f'; g.lineWidth = 1; for (let k = 0; k < 4; k++) { g.beginPath(); g.moveTo(Math.random() * s, 0); g.lineTo(Math.random() * s, s); g.stroke(); } // hairline cracks
  g.globalAlpha = 1; return finalize(c, 1, 1);
}

const injectWorldPos = (shader) => {                 // a world-space position varying (through the instance matrix)
  shader.vertexShader = shader.vertexShader
    .replace('#include <common>', '#include <common>\nvarying vec3 vWorldPos;')
    .replace('#include <begin_vertex>', `#include <begin_vertex>
      vec4 wW = vec4(transformed, 1.0);
      #ifdef USE_INSTANCING
        wW = instanceMatrix * wW;
      #endif
      vWorldPos = (modelMatrix * wW).xyz;`);
};
const GLSL_NOISE = `                                   // value noise + fbm, shared by the wall & ceiling shaders
  float wh(vec3 p){ p = fract(p * 0.3183099 + vec3(0.1, 0.2, 0.3)); p *= 17.0; return fract(p.x*p.y*p.z*(p.x+p.y+p.z)); }
  float wn(vec3 x){ vec3 i = floor(x), f = fract(x); f = f*f*(3.0-2.0*f);
    return mix(mix(mix(wh(i+vec3(0,0,0)), wh(i+vec3(1,0,0)), f.x), mix(wh(i+vec3(0,1,0)), wh(i+vec3(1,1,0)), f.x), f.y),
               mix(mix(wh(i+vec3(0,0,1)), wh(i+vec3(1,0,1)), f.x), mix(wh(i+vec3(0,1,1)), wh(i+vec3(1,1,1)), f.x), f.y), f.z); }
  float wfbm(vec3 p){ float a = 0.5, s = 0.0; for (int i = 0; i < 4; i++){ s += a * wn(p); p = p*2.02 + vec3(11.0); a *= 0.5; } return s; }`;

// Walls/columns: dingy wallpaper computed in WORLD space (never tiles/stretches), plus baseboard
// grime keyed to each wall's OWN floor — the floor height rides in instanceColor.r so the grime
// stays at the bottom even on a 24m atrium wall. Keeps MeshStandardMaterial (PBR/fog) intact.
const POOL_TINT = 'vec3(1.0, 0.92, 0.72)';   // warm fluorescent tint for the baked lamp pools (GLSL literal)
// GLSL snippet: add the baked lamp-pool light (instanceColor.g) to a surface as emissive, so lit pools glow
// over the dim ambient base. `gain` scales it per surface (ceilings catch less direct light than floors).
const poolAdd = (gain) => `totalEmissiveRadiance += diffuseColor.rgb * vColor.g * ${gain} * ${POOL_TINT};`;

const wallMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.85 });
wallMat.onBeforeCompile = (shader) => {
  injectWorldPos(shader);
  shader.fragmentShader = shader.fragmentShader
    .replace('#include <common>', `#include <common>
      varying vec3 vWorldPos;
      float gShade = 1.0;
      ${GLSL_NOISE}
      vec3 wallpaper(vec3 wp, float baseY){
        vec3 base = vec3(0.90, 0.86, 0.62);                 // much lighter, paler yellow
        float mott  = wfbm(wp * 0.56);                      // all noise freqs doubled -> twice the detail/resolution
        float grain = wn(wp * 11.0);
        vec3 col = base * (0.66 + 0.6 * mott);
        col *= (0.95 + 0.1 * grain);
        float drip = wfbm(vec3(wp.x * 2.8, wp.y * 0.2, wp.z * 2.8) + 20.0);
        col = mix(col, col * vec3(0.6, 0.56, 0.43), smoothstep(0.52, 0.82, drip) * 0.5);
        float h = max(wp.y - baseY, 0.0);                   // height above THIS wall's floor
        float band = smoothstep(1.7, 0.0, h);               // grime fades out ~1.7m up
        float gnoise = wfbm(vec3(wp.x * 2.2, h * 1.4, wp.z * 2.2) + 60.0);
        float grime = clamp(band * (0.4 + 0.9 * gnoise), 0.0, 1.0);
        col *= (1.0 - 0.6 * grime);
        gShade = clamp(mott, 0.0, 1.0);
        return pow(max(col, 0.0), vec3(2.2));               // sRGB-chosen -> linear (renderer is colour-managed)
      }`)
    .replace('#include <color_fragment>', '')               // instanceColor.r carries floor height, not a tint
    .replace('#include <map_fragment>', `#include <map_fragment>
      diffuseColor.rgb *= wallpaper(vWorldPos, vColor.r);`)
    .replace('#include <emissivemap_fragment>', `#include <emissivemap_fragment>
      ${poolAdd(POOL_GAIN)}`)                              // instanceColor.g = baked lamp-pool light (additive)
    .replace('#include <roughnessmap_fragment>', `#include <roughnessmap_fragment>
      roughnessFactor = clamp(roughnessFactor * (1.06 - 0.16 * gShade), 0.45, 1.0);`);

// Ceiling: procedural rectangular drop-ceiling tiles in world space — grout lines, per-tile shade,
// and occasional brown water stains. instanceColor.r dims the 2x2 block beneath a dead light.
const ceilMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9, side: THREE.FrontSide });
ceilMat.onBeforeCompile = (shader) => {
  injectWorldPos(shader);
  shader.fragmentShader = shader.fragmentShader
    .replace('#include <common>', `#include <common>
      varying vec3 vWorldPos;
      ${GLSL_NOISE}
      // Returns the tile+rail albedo and, via out params, the rail mask + brushed-metal factor that the
      // roughness/emissive passes below reuse (all share this main() scope, evaluated in include order).
      vec3 ceiling(vec3 wp, out float railMask, out float brush){
        vec2 tile = vec2(1.2, 0.6);                         // rectangular office tiles (m)
        vec2 q = wp.xz / tile;
        vec2 id = floor(q), f = fract(q);
        vec2 ed = min(f, 1.0 - f) * tile;                   // world distance to nearest grid line (x: cross lines, y: main lines)

        // ---- porous, dingy white tile face -------------------------------------------
        vec3 face = vec3(0.80, 0.81, 0.82) * (0.86 + 0.28 * wh(vec3(id, 7.0)));  // per-tile tone variation
        face *= 0.93 + 0.09 * wn(wp * 26.0);                // fine porous speckle (mineral-fibre tile)
        face *= 1.0 - 0.16 * smoothstep(0.45, 0.95, wfbm(wp * 1.7));            // irregular large-scale dinginess
        // water stains: pale wetted centre fading OUT to a darker tide-line rim (kept, refined)
        float stained = step(0.992, wh(vec3(id, 19.0)));    // ~0.8% of tiles stained (rare — less is more)
        vec2 sc = vec2(wh(vec3(id, 3.0)), wh(vec3(id, 5.0)));
        vec2 rel = (f - sc) * tile;                         // offset from the stain centre, in metres
        // domain-warp the sample point with two low-freq fbm fields so the outline grows organic lobes
        // and fingers (not a disc), then a higher-freq wobble frays the edge -> lots of shape variety.
        vec2 w2 = vec2(wfbm(wp * 5.0 + 11.0), wfbm(wp * 5.0 + 23.0)) - 0.5;
        float ragged = 0.78 + 0.6 * wfbm(wp * 13.0);
        float dist = length(rel + w2 * 0.24) * ragged;
        float R = 0.30;                                     // nominal stain radius (m)
        float inside = smoothstep(R, R - 0.06, dist);       // 1 across the wetted patch, fading out at the edge
        float rim = smoothstep(R - 0.18, R - 0.03, dist);   // rises toward the edge -> a darker tide line at the rim
        float amt = inside * (0.22 + 0.78 * rim) * (0.82 + 0.18 * wn(wp * 11.0)); // pale wash in the centre, dark at the rim
        face = mix(face, face * vec3(0.46, 0.38, 0.28), stained * amt);

        // ---- aluminium drop-grid tees, laid OVER the tile ----------------------------
        float hw = 0.020, soft = 0.005;                     // half-width of the visible tee face (m)
        float rA = 1.0 - smoothstep(hw - soft, hw + soft, ed.x);   // cross tee   (runs along z, at x grid lines)
        float rB = 1.0 - smoothstep(hw - soft, hw + soft, ed.y);   // MAIN runner (runs along x, at z grid lines)
        railMask = max(rA, rB);
        float onMain = step(rA, rB);                        // main runner dominates (incl. the overlap junctions)
        float crossTee = rA * (1.0 - rB);                   // exposed cross tee, where it isn't tucked under a main
        float bev = mix(1.0 - clamp(ed.x / hw, 0.0, 1.0),   // rounded-tee bevel: bright at centre, dark down the flanks
                        1.0 - clamp(ed.y / hw, 0.0, 1.0), onMain);
        brush = mix(wn(vec3(wp.z * 55.0, id.x, 0.0)),       // brushed-metal streaks running along the rail length
                    wn(vec3(wp.x * 55.0, id.y, 9.0)), onMain);
        vec3 alu = vec3(0.80, 0.82, 0.85);                  // aluminium base albedo (the glossy glint is added in the emissive pass)
        alu *= 0.82 + 0.30 * brush;                         // brushed tone
        alu *= 0.55 + 0.45 * bev;                           // bevel shading down the flanks
        alu = mix(alu, alu * 0.55, crossTee * 0.7);         // cross tee reads darker where it passes under the main runner

        vec3 col = mix(face, alu, railMask);                // rails over the tile face

      }`)
    .replace('#include <color_fragment>', '')               // instanceColor.r = dead-light dimming, not a tint
    .replace('#include <map_fragment>', `#include <map_fragment>
      float railMask, brush;
      diffuseColor.rgb *= ceiling(vWorldPos, railMask, brush) * vColor.r;`)
    .replace('#include <roughnessmap_fragment>', `#include <roughnessmap_fragment>
      roughnessFactor = mix(roughnessFactor, 0.30, railMask);`) // tiles stay matte (0.9); the metal rails are glossy
    .replace('#include <emissivemap_fragment>', `#include <emissivemap_fragment>
      {
        // Faux polished-aluminium glint. With no env map, real metalness reads black; instead add a tight
        // view-dependent specular lobe (a virtual key light) that slides along the rails as the camera moves
        // — cheap, and sells the metal. Gated to the rails, brushed, and dimmed under dead lights (vColor.r).
        vec3 V = normalize(cameraPosition - vWorldPos);
        vec3 N = vec3(0.0, -1.0, 0.0);                      // ceiling underside, facing the room
        vec3 L = normalize(vec3(0.3, -1.0, 0.25));          // virtual key light
        float ndh = max(dot(N, normalize(L + V)), 0.0);
        float glint = pow(ndh, 200.0) * (0.35 + 0.65 * brush);
        totalEmissiveRadiance += vec3(0.95, 0.97, 1.0) * glint * railMask * 1.8 * vColor.r;
      }
      ${poolAdd(POOL_GAIN * 0.4)}`);                       // ceilings catch only a little of the lamp pool (they face away)
};
